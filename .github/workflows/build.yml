name: Custom Rockchip Build Factory

on:
  workflow_dispatch:
    inputs:
      board:
        description: '选择目标开发板 (Target Board)'
        required: true
        default: 'orangepi-5b'
        type: choice
        options:
          - orangepi-5
          - orangepi-5b
          - orangepi-5-plus
          - orangepi-5-pro
          - rock-5b
          - rock-5a
          - radxa-zero3
          - nanopc-t6
      flavor:
        description: '系统形态 (Image Flavor)'
        required: true
        default: 'server'
        type: choice
        options:
          - server
          - desktop
      suite:
        description: 'Ubuntu 版本代号 (Release Suite)'
        required: true
        default: 'noble'
        type: choice
        options:
          - noble    # Ubuntu 24.04 LTS (推荐)
          - jammy    # Ubuntu 22.04 LTS (老旧但极度稳定)
          - oracular # (可选) 顺便你也可以加上 24.10
jobs:
  # 阶段 1：构建基础根文件系统
  rootfs:
    runs-on: ubuntu-latest
    name: Prepare RootFS
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support debootstrap xz-utils python3-yaml dctrl-tools

      - name: Build RootFS
        run: |
          sudo ./build.sh --suite=${{ github.event.inputs.suite }} --flavor=${{ github.event.inputs.flavor }} --rootfs-only

      - name: Upload RootFS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ github.event.inputs.suite }}-${{ github.event.inputs.flavor }}
          path: ./build/*.rootfs.tar.xz

  # 阶段 2：编译内核
  kernel:
    runs-on: ubuntu-latest
    name: Prepare Kernel
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@main

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu bison flex libssl-dev bc rsync kmod cpio

      - name: Build Kernel
        run: |
          sudo ./build.sh --suite=${{ github.event.inputs.suite }} --kernel-only

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.event.inputs.suite }}
          path: ./build/linux-*.deb

  # 阶段 3：最终镜像封装
  build:
    runs-on: ubuntu-latest
    needs: [rootfs, kernel]
    name: Finalize Image
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@main

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download RootFS
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ github.event.inputs.suite }}-${{ github.event.inputs.flavor }}
          path: ./build/

      - name: Download Kernel
        uses: actions/download-artifact@v4
        with:
          name: kernel-${{ github.event.inputs.suite }}
          path: ./build/

      - name: Assemble Final Image
        run: |
          # 安装必要的磁盘处理工具
          sudo apt-get update
          sudo apt-get install -y parted dosfstools uuid-runtime u-boot-tools
          # 执行最终构建
          sudo ./build.sh --board=${{ github.event.inputs.board }} --suite=${{ github.event.inputs.suite }} --flavor=${{ github.event.inputs.flavor }}

      - name: Upload Final Image
        uses: actions/upload-artifact@v4
        with:
          name: Ubuntu-${{ github.event.inputs.suite }}-${{ github.event.inputs.flavor }}-${{ github.event.inputs.board }}
          path: ./images/*.img.xz
